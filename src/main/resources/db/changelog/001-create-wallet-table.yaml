databaseChangeLog:
  - changeSet:
      id: 001
      author: yourname
      preConditions:
        - onFail: MARK_RAN
          not:
            tableExists:
              tableName: wallet
      changes:
        - createTable:
            tableName: wallet
            columns:
              - column:
                  name: id
                  type: uuid
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: balance
                  type: numeric(19,2)
                  defaultValueNumeric: 0
                  constraints:
                    nullable: false
              - column:
                  name: version
                  type: bigint
                  constraints:
                    nullable: false